<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="dark"/>
  <title>Journal · SEBIV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #131211;
      --bg2: #1c1b19;
      --bg3: #232220;
      --border: #2e2c29;
      --text: #f0ede8;
      --text-muted: #888580;
      --purple: #9B6FC6;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 48px;
      background: rgba(19,18,17,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo img { height: 28px; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--purple); }

    /* PAGE HEADER */
    .page-header {
      padding: 160px 48px 80px;
      max-width: 1100px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .page-header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .page-header-title {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: var(--text);
    }
    .page-header-sub {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    /* JOURNAL LIST */
    .journal-list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px 120px;
    }

    .entry {
      display: grid;
      grid-template-columns: 160px 1fr auto;
      gap: 48px;
      align-items: start;
      padding: 52px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
    }

    .entry:hover .entry-title { color: var(--purple); }
    .entry:hover .entry-arrow { color: var(--purple); transform: translateX(4px); }

    .entry-meta {
      padding-top: 6px;
    }

    .entry-date {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .entry-song {
      font-size: 11px;
      color: var(--purple);
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    .entry-body { padding-top: 4px; }

    .entry-title {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 14px;
      color: var(--text);
      transition: color 0.2s;
    }

    .entry-quote {
      font-size: 13px;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 6px;
      padding-left: 14px;
      border-left: 2px solid var(--border);
    }

    .entry-quote-author {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding-left: 14px;
      margin-bottom: 16px;
    }

    .entry-excerpt {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .entry-arrow {
      font-size: 18px;
      color: var(--border);
      padding-top: 8px;
      transition: color 0.2s, transform 0.2s;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 48px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    footer a { color: var(--purple); text-decoration: none; }

    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .page-header { padding: 120px 24px 60px; }
      .journal-list { padding: 0 24px 80px; }
      .entry {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 40px 0;
      }
      .entry-arrow { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="SEBIV"/></a>
    <ul class="nav-links">
      <li><a href="index.html#shop">Shop</a></li>
      <li><a href="journal.html" class="active">Journal</a></li>
      <li><a href="index.html#community">Community</a></li>
      <li><a href="index.html#about">About</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p class="page-header-eyebrow">002 · Journal</p>
    <h1 class="page-header-title">Journal</h1>
    <p class="page-header-sub">Thoughts, energy, observations. Real ones only.</p>
  </div>

  <div class="journal-list" id="journalList"></div>

  <footer>
    <a href="index.html">SEBIV</a> &nbsp;·&nbsp; <a href="faq.html">FAQ & Policies</a> &nbsp;·&nbsp; <a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a> &nbsp;·&nbsp; © 2026 All rights reserved.
  </footer>

  <script src="entries.js"></script>
  <script>
    const list = document.getElementById('journalList');
    JOURNAL_ENTRIES.forEach(e => {
      list.innerHTML += `
        <a href="${e.file}" class="entry">
          <div class="entry-meta">
            <p class="entry-date">${e.date}</p>
            <p class="entry-song">♪ ${e.artist}<br>${e.song}</p>
          </div>
          <div class="entry-body">
            <h2 class="entry-title">${e.title}</h2>
            <p class="entry-quote">"${e.quote}"</p>
            <p class="entry-quote-author">${e.quoteAuthor}</p>
            <p class="entry-excerpt">${e.excerpt}</p>
          </div>
          <div class="entry-arrow">→</div>
        </a>`;
    });
  </script>
